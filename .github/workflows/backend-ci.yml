name: Backend CI — 131 Tier A Tests

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: pytest — full gate2 suite (131 Tier A tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install runtime + test dependencies
        run: |
          pip install -r requirements.txt -r requirements-test.txt

      - name: Run all Tier A offline tests
        # Tests run from the backend root so 'import main', 'import config',
        # 'import rate_limit', and 'import plan_quota' all resolve correctly.
        # JWT_SECRET is intentionally NOT set — startup-failure tests verify
        # the insecure-default rejection path.
        # No live network calls; all external service addresses are unreachable.
        run: pytest tests/gate2/ -v --tb=short

      - name: Verify config.py has no live secrets
        run: |
          if grep -qE '(sk-proj-|eyJhbGci|Bearer [a-zA-Z0-9]{20})' config.py; then
            echo "FAIL: config.py appears to contain a live credential"
            exit 1
          fi
          echo "PASS: no live credentials in config.py"

      - name: Verify render.yaml declares required env vars
        run: |
          for var in JWT_SECRET REDIS_URL RESEND_API_KEY APP_BASE_URL; do
            if ! grep -q "$var" render.yaml; then
              echo "FAIL: $var not declared in render.yaml"
              exit 1
            fi
          done
          echo "PASS: all required env vars declared in render.yaml"

[pytest]
testpaths = tests
# Tests run in the backend/ directory so 'import main' and 'import config' resolve correctly.
# Run: pytest          (all tests)
#      pytest tests/gate2/   (gate2 only)
markers =
    tier_a: Tier A — offline, no network, no external services
    tier_b: Tier B — Vercel preview, read-only HTTP
    tier_c: Tier C — production smoke, authorized only
    gate2_release_check: Must pass before any Gate 2 release
